name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run server unit tests
        run: pnpm --filter server test
        env:
          JWT_SECRET: test_secret_for_ci_minimum_32_characters
          REFRESH_SECRET: test_refresh_secret_for_ci_min_32_chars

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dashboard/shared build
      - name: Run client unit tests
        run: pnpm --filter client test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-server, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_dashboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dashboard/shared build
      - name: Run DB migrations and seed
        run: |
          pnpm --filter server db:generate
          pnpm --filter server db:migrate
          pnpm --filter server db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_dashboard_test
          JWT_SECRET: test_secret_for_ci_minimum_32_characters
          REFRESH_SECRET: test_refresh_secret_for_ci_min_32_chars
      - name: Install Playwright browsers
        run: pnpm --filter client exec playwright install chromium --with-deps
      - name: Run E2E tests
        run: pnpm --filter client test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_dashboard_test
          JWT_SECRET: test_secret_for_ci_minimum_32_characters
          REFRESH_SECRET: test_refresh_secret_for_ci_min_32_chars
          CORS_ORIGIN: http://localhost:5173
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/client/playwright-report/
